<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mapa NDVI - Análise de Solo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100vw; background-color: #f1f1f1; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 30px; border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; z-index: 1000; max-width: 300px;
        }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #2E7D32; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div style="font-size: 18px; color: #333;">Processando dados do satélite...</div>
        <div style="font-size: 12px; color: #888;">Aguarde um instante</div>
    </div>
    <div id="map"></div>

    <script>
        // URL CORRETA (sem o "V" extra) e Chave do Projeto NDVI
        const supabase = window.supabase.createClient(
            'https://fpdtvhpnxdktsoolejo.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwZHR2aHBueGRrdHNub29sZWpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMjMzNzcsImV4cCI6MjA5Nzc5OTM3N30.UrItw_5TsLsI9lNWeiwg45XF2s-zvcaVs1suMHs1A20',
            {
                auth: { autoRefreshToken: false, persistSession: false },
                realtime: { enabled: false }
            }
        );

        const urlParams = new URLSearchParams(window.location.search);
        const talhaoId = urlParams.get('id');

        if (!talhaoId) {
            document.getElementById('loading').innerHTML = '<div style="color:red;">Erro: Link inválido (Falta o ID).</div>';
        } else {
            supabase
                .from('talhoes')
                .select('*, clientes(nome)')
                .eq('id', talhaoId)
                .then(({ data, error }) => {
                    if (error) throw error;

                    document.getElementById('loading').style.display = 'none';

                    if (data.length === 0) {
                        document.getElementById('loading').style.display = 'flex';
                        document.getElementById('loading').innerHTML = '<div style="color:red;">Erro: ID não encontrado no banco de dados.</div>';
                        return;
                    }

                    const talhao = data[0];
                    const geom = talhao.geom;
                    const imagemBase64 = talhao.imagem_ndvi;
                    const nomeTalhao = talhao.codigo_talhao;
                    const nomeCliente = talhao.clientes ? talhao.clientes.nome : 'Cliente';

                    const map = L.map('map').setView([-20.92, -49.65], 14);
                    
                    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                        attribution: 'Esri', maxZoom: 19
                    }).addTo(map);

                    L.geoJSON(geom, {
                        style: function(feature) {
                            return { color: 'white', weight: 3, fillColor: 'transparent', fillOpacity: 0 };
                        },
                        onEachFeature: function(feature, layer) {
                            layer.bindPopup(`
                                <div style="width: 220px; font-family: Arial;">
                                    <h3 style="color: #2E7D32; margin: 0 0 5px 0;">${nomeCliente}</h3>
                                    <b>Talhão:</b> ${nomeTalhao}<br>
                                    <hr style="border: 1px solid #eee; margin: 5px 0;">
                                    <small><i>NDVI Sentinel-2</i></small>
                                </div>
                            `);
                        }
                    }).addTo(map);

                    const bounds = L.geoJSON(geom).getBounds();

                    if (imagemBase64 && imagemBase64.length > 50) {
                        L.imageOverlay('data:image/png;base64,' + imagemBase64, bounds, { opacity: 0.9 }).addTo(map);
                    } else {
                        document.getElementById('loading').style.display = 'flex';
                        document.getElementById('loading').innerHTML = `
                            <div style="background-color: #fff3e0; border-left: 6px solid #ff980f; padding: 20px; text-align: center;">
                                <h2 style="color: #e65100; margin-top: 0;">Imagem NDVI em processamento ou ausente.</h2>
                                <p>O talhão <b>${nomeTalhao}</b> foi encontrado, mas a imagem NDVI ainda está sendo gerada.</p>
                                <p><small>Tente novamente em alguns minutos.</small></p>
                            </div>
                            <br>
                            <button onclick="location.reload()" style="padding: 10px 20px; background: #2E7D32; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer;">Tentar Novamente</button>
                        `;
                    }

                    map.fitBounds(bounds, { padding: [20, 20] });
                })
                .catch(error => {
                    document.getElementById('loading').style.display = 'flex';
                    document.getElementById('loading').innerHTML = `
                        <div style="background-color: #ffebee; border-left: 6px solid #d32f2f; padding: 20px; text-align: center;">
                            <h2 style="color: #d32f2f; margin-top: 0;">Erro de Conexão</h2>
                            <p><small>Erro: ${error.message || 'Erro desconhecido'}</small></p>
                        </div>
                        <br>
                        <button onclick="location.reload()" style="padding: 10px 20px; background: #d32f2f; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer;">Tentar Novamente</button>
                    `;
                });
        }
    </script>
</body>
</html>
