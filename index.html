<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mapa NDVI - Análise de Solo</title>
    <link rel="stylesheet" href="https://unpkg.com/imagem de satélite de alta resolucao/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tabela de dados, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100vw; background-color: #222; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 30px; border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; z-index: 1000; max-width: 300px;
        }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #2E7D32; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div style="font-size: 18px; color: #333;">Processando dados do satélite...</div>
        <div style="font-size: 12px; color: #888;">Aguarde um instante</div>
    </div>
    <div id="map"></div>

    <script>
        const SUPABASE_URL = 'https://fpdtvhpnxdktsnoolejo.supabase.co/rest/v1';
        const SUPABASE_KEY = 'SUA_ANON_KEY_AQUI';

        const urlParams = new URLSearchParams(window.location.search);
        const talhaoId = urlParams.get('id');

        if (!talhaoId) {
            document.getElementById('loading').style.display = 'flex'; 
            document.getElementById('loading').innerHTML = '<div style="color:red;">Erro: Link inválido (Falta o ID no link).</div>';
        } else {
            fetch(`${SUPABASE_URL}/talhoes?id=eq.${talhaoId}&select=*,clientes(nome)`, {
                headers: { 
                    'apikey': SUPABASE_KEY, 
                    'Authorization': `Bearer ${SUPABASE_KEY}` 
                }
            })
            .then(response => {
                if (!response.ok) throw new Error('Erro de conexão com o banco de dados');
                return response.json();
            })
            .then(data => {
                document.getElementById('loading').style.display = 'none';

                if (data.length === 0) {
                    document.getElementById('loading').style.display = 'flex';
                    document.getElementById('loading').innerHTML = `
                        <div style="background-color: #fff3e0; border-left: 6px solid #ff980f; padding: 20px; text-align: center;">
                            <h2 style="color: #e65100; margin-top: 0;">Imagem NDVI ainda está em processamento.</h2>
                            <p>O talhão <b>${data[0].codigo_talhao}</b> foi encontrado, mas a foto do NDVI ainda está sendo gerada no servidor.</p>
                            <p><small>Tente acessar este link novamente em 5 minutos.</small></p>
                            <br>
                            <button onclick="location.reload()" style="padding: 10px 20px; background: #2E7D32; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer;">Tentar Novamente</button>
                        </div>
                    `;
                    return;
                }

                const talhao = data[0];
                const geom = talhao.geom;
                const imagemBase64 = talhao.imagem_ndvi;
                const nomeTalhao = talhao.codigo_talhao;
                const nomeCliente = talhao.clientes.nome;

                const map = L.map('map').setView([-20.92, -49.65], 14);
                
                // Imagem de Satélite de Fundo
                L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                    attribution: 'Esri', maxZoom: 19
                }).addTo(map);

                // Desenha a borda branca do talhão
                const geoJsonLayer = L.geoJSON(geom, {
                    style: function(feature) {
                        return { color: 'white', weight: 3, fillColor: 'transparent', fillOpacity: 0 };
                    },
                    onEachFeature: function(feature, layer) {
                        layer.bindPopup(`
                            <div style="width: 220px; font-family: Arial;">
                                <h3 style="color: #2E7D32; margin: 0 0 5px 0;">${nomeCliente}</h3>
                                <b>Talhão:</b> ${nomeTalhao}<br>
                                <hr style="border: 1px solid #eee; margin: 5px 0;">
                                <small><i>NDVI Sentinel-2</i></small>
                            </div>
                        `);
                    }
                }).addTo(map);

                // Se a imagem NDVI existir, coloca por trás do contorno
                if (imagemBase64 && imagemBase64.length > 50) {
                    const tempLayer = L.geoJSON(geom);
                    const bounds = tempLayer.getBounds();
                    const imageUrl = 'data:image/png;base64,' + imagemBase64;
                    L.imageOverlay(imageUrl, bounds, { opacity: 0.9 }).addTo(map);
                } else {
                    // Se não tiver imagem, avisa o usuário
                    document.getElementById('loading').style.display = 'flex';
                    document.getElementById('loading').innerHTML = `
                        <div style="background-color: #ffebee; border-left: 6px solid #d32f2f; padding: 20px; text-align: center;">
                            <h2 style="Imagem NDVI ausente.</h2>
                            <p>O sistema não encontrou a imagem para o talhão <b>${nomeTalhao}</b>. Ele foi salvo apenas como desenho geométrico.</p>
                            <br>
                            <button onclick="location.reload()" style="padding: 10px 20px; background: #d32f2f; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer;">Recarregar Página</button>
                        </div>
                    `;
                }

                map.fitBounds(bounds, { padding: [20, 20] });
            })
            .catch(error => {
                // Se der erro de internet ou de sintaxe, mostra na tela em vez de tela preta
                document.getElementById('loading').style.display = 'flex';
                document.getElementById('loading').innerHTML = `
                    <div style="background-color: #ffebee; border-left: 6px solid #d32f2f; padding: 20px; text-align: center;">
                        <h2 style="Erro de Conexão</h2>
                        <p>Não foi possível buscar os dados no servidor. A internet caiu ou o banco de dados está em manutenção.</p>
                        <p><small>Erro do navegador: ${error.message || 'Erro desconhecido'}</small></p>
                    </div>
                    <br>
                    <button onclick="location.reload()" style="padding: 10px 20px; background: #d32f2f; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer;">Tentar Novamente</button>
                `;
            });
        }
    </script>
</body>
</html>
