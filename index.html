<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mapa NDVI - Análise de Solo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100vw; background-color: #111827; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 30px; border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; z-index: 1000; max-width: 300px;
        }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #2E7D32; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-950 text-white">

    <!-- TELA 1: PAINEL DE LISTA -->
    <div id="tela-lista" class="min-h-screen p-4">
        <div class="max-w-md mx-auto">
            <div class="text-center mb-6 pt-6">
                <div class="w-14 h-14 bg-green-600 rounded-full flex items-center justify-center mx-auto mb-3 text-xl font-bold">N</div>
                <h1 class="text-xl font-bold">Painel NDVI</h1>
                <p class="text-gray-500 text-sm">Selecione um talhão para visualizar</p>
            </div>
            
            <div id="loading-lista" class="text-center text-gray-500 py-10">Buscando talhões...</div>
            <div id="lista-talhoes" class="space-y-4 pb-10"></div>
        </div>
    </div>

    <!-- TELA 2: MAPA -->
    <div id="tela-mapa" class="hidden">
        <button onclick="voltarParaLista()" class="absolute top-4 left-4 z-[1001] bg-gray-900 border border-gray-700 text-white px-4 py-2 rounded-lg shadow-lg hover:bg-gray-800 text-sm font-medium flex items-center gap-2">
            ← Voltar
        </button>
        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <div style="font-size: 18px; color: #333;">Processando dados do satélite...</div>
            <div style="font-size: 12px; color: #888;">Aguarde um instante</div>
        </div>
        <div id="map"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://keiydgyountsuzjybsng.supabase.co/rest/v1';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtlaXlkZ3lvdW50c3V6anlic25nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1ODY1MTksImV4cCI6MjA5ODE2MjUxOX0.Cd3TqUBZsNWV00AZGkrElJVmNlWPccDgtl-n95BVwjg';

        let mapaAtual = null;

        // ==========================================
        // LÓGICA DO PAINEL (TELA 1)
        // ==========================================
        function carregarLista() {
            fetch(`${SUPABASE_URL}/talhoes?select=id,codigo_talhao,imagem_ndvi,clientes(nome)&order=id.desc`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('loading-lista').style.display = 'none';
                if (data.length === 0) {
                    document.getElementById('lista-talhoes').innerHTML = '<p class="text-center text-gray-600">Nenhum talhão encontrado.</p>';
                    return;
                }

                const clientes = {};
                data.forEach(talhao => {
                    const nome = talhao.clientes?.nome || 'Cliente Desconhecido';
                    if (!clientes[nome]) clientes[nome] = [];
                    clientes[nome].push(talhao);
                });

                let htmlFinal = '';
                for (const [nome, talhoes] of Object.entries(clientes)) {
                    htmlFinal += `<div class="mb-6"><h2 class="text-green-400 font-bold text-base mb-2 border-b border-gray-800 pb-2">🌾 ${nome} (${talhoes.length})</h2><div class="space-y-2">`;
                    talhoes.forEach(t => {
                        const temImg = t.imagem_ndvi && t.imagem_ndvi.length > 50;
                        const badge = temImg ? '<span class="text-xs bg-green-900 text-green-300 px-2 py-0.5 rounded-full">NDVI Pronto</span>' : '<span class="text-xs bg-yellow-900 text-yellow-300 px-2 py-0.5 rounded-full">Pendente</span>';
                        htmlFinal += `<div onclick="abrirMapa('${t.id}')" class="block bg-gray-900 border border-gray-800 p-3 rounded-lg hover:border-green-600 transition-all cursor-pointer active:scale-95"><div class="flex items-center justify-between"><span class="font-medium text-sm">${t.codigo_talhao}</span>${badge}</div></div>`;
                    });
                    htmlFinal += `</div></div>`;
                }
                document.getElementById('lista-talhoes').innerHTML = htmlFinal;
            });
        }

        // ==========================================
        // LÓGICA DO MAPA (TELA 2)
        // ==========================================
        function abrirMapa(id) {
            // Troca de tela
            document.getElementById('tela-lista').classList.add('hidden');
            document.getElementById('tela-mapa').classList.remove('hidden');
            document.getElementById('loading').classList.remove('hidden');

            // Busca os dados pesados (geometria e imagem) só agora
            fetch(`${SUPABASE_URL}/talhoes?id=eq.${id}&select=*,clientes(nome)`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            })
            .then(response => {
                if (!response.ok) throw new Error('Erro HTTP: ' + response.status);
                return response.json();
            })
            .then(data => {
                document.getElementById('loading').classList.add('hidden');
                if (data.length === 0) { alert("Talhão não encontrado."); voltarParaLista(); return; }

                const talhao = data[0];
                const geom = typeof talhao.geom === 'string' ? JSON.parse(talhao.geom) : talhao.geom;
                const imagemBase64 = talhao.imagem_ndvi;
                const nomeTalhao = talhao.codigo_talhao;
                const nomeCliente = talhao.clientes ? talhao.clientes.nome : 'Cliente';

                // Inicializa mapa
                if (mapaAtual) mapaAtual.remove();
                mapaAtual = L.map('map').setView([-20.92, -49.65], 14);
                L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri', maxZoom: 19 }).addTo(mapaAtual);

                L.geoJSON(geom, {
                    style: { color: 'white', weight: 3, fillColor: 'transparent', fillOpacity: 0 },
                    onEachFeature: (feature, layer) => layer.bindPopup(`<div style="width: 220px; font-family: Arial;"><h3 style="color: #2E7D32; margin: 0 0 5px 0;">${nomeCliente}</h3><b>Talhão:</b> ${nomeTalhao}<br><hr style="border: 1px solid #eee; margin: 5px 0;"><small><i>NDVI Sentinel-2</i></small></div>`)
                }).addTo(mapaAtual);

                const bounds = L.geoJSON(geom).getBounds();

                if (imagemBase64 && imagemBase64.length > 50) {
                    L.imageOverlay('data:image/png;base64,' + imagemBase64, bounds, { opacity: 0.9 }).addTo(mapaAtual);
                } else {
                    alert("Imagem NDVI em processamento ou ausente para este talhão.");
                }
                mapaAtual.fitBounds(bounds, { padding: [50, 20] });
            })
            .catch(error => {
                document.getElementById('loading').classList.add('hidden');
                alert("Erro de conexão: " + error.message);
            });
        }

        function voltarParaLista() {
            document.getElementById('tela-mapa').classList.add('hidden');
            document.getElementById('tela-lista').classList.remove('hidden');
            if (mapaAtual) { mapaAtual.remove(); mapaAtual = null; }
        }

        // Inicia a lista ao abrir o site
        carregarLista();
    </script>
</body>
</html>
