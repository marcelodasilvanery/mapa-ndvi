<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa NDVI - Diagnóstico</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #111827; color: white; }
        #map { height: 100vh; width: 100vw; display: none; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; z-index: 1000; max-width: 350px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #2E7D32; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .lista-container { max-width: 640px; margin: 0 auto; padding: 15px; padding-bottom: 100px; }
        .header { text-align: center; margin-bottom: 20px; }
        .header-circle { width: 56px; height: 56px; background: #16a34a; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-size: 24px; font-weight: bold; }
        .card { background: #1f2937; border: 1px solid #374151; border-radius: 12px; padding: 12px 15px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .card:active { transform: scale(0.98); }
        .checkbox { appearance: none; width: 22px; height: 22px; border: 2px solid #4B5563; border-radius: 4px; background: #1F2937; cursor: pointer; flex-shrink: 0; }
        .checkbox:checked { background: #16a34a; border-color: #16a34a; background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3e%3c/svg%3e"); }
        .badge { font-size: 11px; padding: 2px 6px; border-radius: 6px; font-weight: 600; }
        .badge-pronto { background: #166534; color: #bbf7d0; }
        .badge-pendente { background: #713f12; color: #fef08a; }
        .nome-talhao { font-size: 14px; flex-grow: 1; }
        #botao-mapa { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: #16a34a; color: white; font-size: 16px; font-weight: bold; padding: 15px; border-radius: 12px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; display: none; z-index: 999; }
        #botao-mapa.visivel { display: block; }
        #botao-voltar { position: fixed; top: 15px; left: 15px; background: rgba(17,24,39,0.9); color: white; border: 1px solid #374151; padding: 10px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; z-index: 1001; display: none; font-size: 14px; }
        #botao-voltar.visivel { display: block; }
        #barra-tempo { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(17, 24, 39, 0.95); backdrop-filter: blur(10px); border-top: 1px solid #374151; padding: 15px; z-index: 1000; display: none; }
        #barra-tempo.visivel { display: block; }
        .barra-conteudo { max-width: 500px; margin: 0 auto; display: flex; flex-direction: row; gap: 10px; align-items: center; justify-content: center; }
        .input-data { background: #374151; border: 1px solid #4b5563; border-radius: 8px; padding: 8px; color: white; font-size: 14px; width: 180px; }
        .botao-historico { background: #2563eb; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; white-space: nowrap; }
        .status-msg { margin-top: 8px; font-size: 12px; color: #9ca3af; text-align: center; min-height: 16px; }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div style="font-size: 18px; color: #333;">Processando dados do satélite...</div>
        <div style="font-size: 12px; color: #888;">Aguarde um instante</div>
    </div>

    <button id="botao-voltar" onclick="voltarParaLista()">← Voltar à lista</button>

    <div class="lista-container" id="tela-lista">
        <div class="header">
            <div class="header-circle">N</div>
            <h1 style="margin: 0;">Painel NDVI</h1>
            <p style="color: #9ca3af; margin-top: 5px;">Selecione talhões para agrupar no mapa</p>
        </div>
        <div id="lista-talhoes">Carregando...</div>
    </div>

    <button id="botao-mapa" onclick="abrirMapaSelecionados()">Ver 0 selecionados no Mapa</button>

    <div id="barra-tempo">
        <div class="barra-conteudo">
            <input type="date" id="input-data" class="input-data">
            <button id="btn-historico" class="botao-historico" onclick="buscarHistorico()">📅 Buscar Histórico</button>
        </div>
        <div id="status-msg" class="status-msg"></div>
    </div>

    <div id="map"></div>

    <script>
        const SUPABASE_URL = 'https://keiydgyountsuzjybsng.supabase.co/rest/v1';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtlaXlkZ3lvdW50c3V6anlic25nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1ODY1MTksImV4cCI6MjA5ODE2MjUxOX0.Cd3TqUBZsNWV00AZGkrElJVmNlWPccDgtl-n95BVwjg';

        const HEADERS = {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY
        };

        let mapaAtual = null;
        let idsSelecionados = [];
        let layersImagem = [];

        // ============================================================
        // DIAGNÓSTICO: Tenta buscar e mostra o erro REAL na tela
        // ============================================================
        document.getElementById('loading').style.display = 'flex';

        fetch(SUPABASE_URL + '/talhoes?select=id,codigo_talhao,tem_ndvi,geom&order=codigo_talhao.asc', {
            headers: HEADERS
        })
        .then(function(res) {
            // Se der erro, mostra o status e a mensagem do Supabase na tela
            if (!res.ok) {
                return res.text().then(function(textoErro) {
                    throw new Error('HTTP ' + res.status + ': ' + textoErro);
                });
            }
            return res.json();
        })
        .then(function(data) {
            document.getElementById('loading').style.display = 'none';

            if (!data || data.length === 0) {
                document.getElementById('lista-talhoes').innerHTML =
                    '<p style="text-align:center;color:#666;padding-top:50px;">Nenhum talhão encontrado.</p>';
                return;
            }

            let html = '';
            data.forEach(function(t) {
                const badge = t.tem_ndvi
                    ? '<span class="badge badge-pronto">Pronto</span>'
                    : '<span class="badge badge-pendente">Pendente</span>';
                html += '<div class="card" onclick="abrirMapa(\'' + t.id + '\')">' +
                    '<input type="checkbox" class="checkbox" onclick="toggleSelect(\'' + t.id + '\', this)">' +
                    '<span class="nome-talhao">' + t.codigo_talhao + '</span>' +
                    badge + '</div>';
            });
            document.getElementById('lista-talhoes').innerHTML = html;
        })
        .catch(function(e) {
            // Em vez de travar, mostra EXATAMENTE o que o Supabase respondeu
            document.getElementById('loading').innerHTML =
                '<div style="background:#1f2937;border:1px solid #ef4444;padding:20px;border-radius:10px;text-align:left;max-width:350px;">' +
                '<div style="color:#ef4444;font-size:16px;margin-bottom:10px;font-weight:bold;">Erro de Conexão</div>' +
                '<div style="color:#d1d5db;font-size:12px;word-break:break-all;background:#111827;padding:10px;border-radius:6px;">' + e.message + '</div>' +
                '<div style="color:#9ca3af;font-size:11px;margin-top:10px;">Copie esta mensagem e envie ao desenvolvedor.</div>' +
                '</div>';
        });

        function toggleSelect(id, checkbox) {
            event.stopPropagation();
            if (checkbox.checked) idsSelecionados.push(id);
            else idsSelecionados = idsSelecionados.filter(function(i) { return i !== id; });
            var btn = document.getElementById('botao-mapa');
            if (idsSelecionados.length > 0) {
                btn.classList.add('visivel');
                btn.innerText = 'Ver ' + idsSelecionados.length + ' selecionados no Mapa';
            } else {
                btn.classList.remove('visivel');
            }
        }

        function abrirMapaSelecionados() { if (idsSelecionados.length > 0) abrirMapaVarios(idsSelecionados); }
        function abrirMapa(idUnico) { abrirMapaVarios([idUnico]); }

        function abrirMapaVarios(ids) {
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('loading').innerHTML = '<div class="spinner"></div><div style="font-size:18px;color:#333;">Carregando imagens...</div>';
            document.getElementById('botao-mapa').classList.remove('visivel');
            document.getElementById('barra-tempo').classList.add('visivel');
            document.getElementById('tela-lista').style.display = 'none';

            fetch(SUPABASE_URL + '/talhoes?id=in.(' + ids.join(',') + ')&select=id,codigo_talhao,imagem_ndvi,geom', { headers: HEADERS })
            .then(function(res) {
                if (!res.ok) throw new Error('Erro HTTP: ' + res.status);
                return res.json();
            })
            .then(function(data) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('map').style.display = 'block';
                document.getElementById('botao-voltar').classList.add('visivel');
                if (!data || data.length === 0) { alert('Nenhum talhão encontrado.'); return; }
                if (mapaAtual) mapaAtual.remove();
                mapaAtual = L.map('map').setView([-20.92, -49.65], 14);
                L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri', maxZoom: 19 }).addTo(mapaAtual);
                var boundsGeral = L.latLngBounds([]);
                layersImagem = [];
                data.forEach(function(t) {
                    var geom = typeof t.geom === 'string' ? JSON.parse(t.geom) : t.geom;
                    var gLayer = L.geoJSON(geom, { style: { color: 'white', weight: 5, fillColor: 'transparent', fillOpacity: 0 } });
                    gLayer.addTo(mapaAtual);
                    boundsGeral.extend(gLayer.getBounds());
                    if (t.imagem_ndvi && t.imagem_ndvi.length > 50) {
                        var iLayer = L.imageOverlay('data:image/png;base64,' + t.imagem_ndvi, gLayer.getBounds(), { opacity: 0.9 });
                        iLayer.addTo(mapaAtual);
                        layersImagem.push(iLayer);
                    }
                });
                mapaAtual.fitBounds(boundsGeral, { padding: [50, 20] });
                setTimeout(function() { mapaAtual.invalidateSize(); }, 300);
            })
            .catch(function(e) {
                document.getElementById('loading').innerHTML = '<div style="background:#f8d7da;border-left:6px solid #d32f2f;padding:20px;text-align:center;"><div style="color:#d32f2f;font-size:16px;margin-bottom:5px;">Erro</div><div style="color:#333;font-size:13px;">' + e.message + '</div></div>';
            });
        }

        function voltarParaLista() {
            document.getElementById('map').style.display = 'none';
            document.getElementById('tela-lista').style.display = 'block';
            document.getElementById('loading').style.display = 'none';
            document.getElementById('barra-tempo').classList.remove('visivel');
            document.getElementById('botao-voltar').classList.remove('visivel');
            if (mapaAtual) { mapaAtual.remove(); mapaAtual = null; }
            layersImagem = [];
        }

        function buscarHistorico() {
            alert('Função de histórico será configurada em breve.');
        }
    </script>
</body>
</html>
